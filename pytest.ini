[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
addopts = --cov=services --cov=main --cov-report=term-missing --no-header -q

[coverage:run]
source = .
omit =
    tests/*
    notebooks/*
    .vscode/*

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__
